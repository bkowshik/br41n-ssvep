project:
  type: book
  resources:
    - "images/"
  post-render:
    - quarto render slides.qmd
    - rm -rf _book/slides
    - mkdir -p _book/slides
    - mv slides.html _book/slides/index.html
    - mv slides_files _book/slides/slides_files
    - cp -R images _book/slides/images

execute:
  freeze: auto

book:
  title: "br41n.io - SSVEP Data Analysis"
  author: "Bhargav Kowshik"
  date: "2026-04-26"
  sidebar:
    logo: logo.png
  chapters:
    - index.qmd
    - part: "Data"
      chapters:
        - 01-recordings.qmd
        - 02-ssvep-signature.qmd
    - part: "Preprocessing"
      chapters:
        - 03-filtering.qmd
        - 04-epoching.qmd
    - part: "Feature Engineering"
      chapters:
        - 05-spectral-features.qmd
        - 06-template-features.qmd
    - part: "Modelling"
      chapters:
        - 07-classification.qmd
    - part: "Evaluation"
      chapters:
        - 08-time-accuracy-itr.qmd
        - 09-subjects.qmd
    - summary.qmd
    - acronyms.qmd
    - references.qmd

bibliography: references.bib

format:
  html:
    include-in-header:
      - posthog.html
    theme:
      - cosmo
      - brand
    css: custom.css
    page-layout: full
    toc: true
    lightbox: auto
    fig-format: retina
    fig-dpi: 96
    code-fold: true
    grid:
      sidebar-width: 300px
      body-width: 1000px
      margin-width: 250px
