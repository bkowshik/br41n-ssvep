project:
  type: book
  resources:
    - "images/"
  post-render:
    - quarto render slides.qmd
    - rm -rf _book/slides.html _book/slides_files
    - mv slides.html slides_files _book/

execute:
  freeze: auto

book:
  title: "br41n.io - SSVEP Data Analysis"
  author: "Bhargav Kowshik"
  date: "2026-04-26"
  chapters:
    - index.qmd
    - part: "Data"
      chapters:
        - 01-recordings.qmd
        - 02-ssvep-signature.qmd
    - part: "Preprocessing"
      chapters:
        - 03-filtering.qmd
        - 04-epoching.qmd
    - part: "Feature Engineering"
      chapters:
        - 05-spectral-features.qmd
        - 06-template-features.qmd
    - part: "Modelling"
      chapters:
        - 07-classification.qmd
    - part: "Evaluation"
      chapters:
        - 08-time-accuracy-itr.qmd
        - 09-subjects.qmd
    - summary.qmd
  appendices:
    - acronyms.qmd
    - references.qmd

bibliography: references.bib

format:
  html:
    theme:
      - cosmo
      - brand
    css: custom.css
    page-layout: full
    toc: true
    lightbox: auto
    fig-format: retina
    fig-dpi: 96
    grid:
      sidebar-width: 225px
      body-width: 1000px
      margin-width: 0px
